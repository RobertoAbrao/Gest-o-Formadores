<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de Tarefas da Equipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            /* Gray-100 */
        }

        .task-card {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }

        .column-drop-zone {
            min-height: 150px;
            transition: background-color 0.2s;
        }

        .column-drop-zone.drag-over {
            background-color: #e5e7eb;
            /* Gray-200 */
            border: 2px dashed #9ca3af;
            /* Gray-400 */
            border-radius: 0.5rem;
        }

        /* Estilos personalizados para o scrollbar das colunas */
        .column-drop-zone::-webkit-scrollbar {
            width: 6px;
        }

        .column-drop-zone::-webkit-scrollbar-track {
            background: transparent;
        }

        .column-drop-zone::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            /* slate-300 */
            border-radius: 20px;
        }
    </style>
</head>

<body class="h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
        <h1 class="text-2xl font-bold">Demandas da Equipe</h1>
        <div class="flex gap-3">
            <button id="ai-summary-btn"
                class="bg-purple-500 text-white px-4 py-2 rounded shadow hover:bg-purple-600 font-medium transition flex items-center gap-2 border border-purple-400"
                title="Gerar resumo executivo com IA">
                <span>✨</span> Resumo IA
            </button>
            <button id="add-task-btn"
                class="bg-white text-blue-600 px-4 py-2 rounded shadow hover:bg-gray-100 font-medium transition flex items-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                Nova Tarefa
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-x-auto p-6">
        <div class="flex gap-6 min-w-max h-full pb-4">

            <!-- Coluna: A Fazer -->
            <div class="bg-gray-200 rounded-lg w-80 flex flex-col shadow-sm max-h-full">
                <div
                    class="p-4 font-semibold text-gray-700 border-b border-gray-300 flex justify-between items-center rounded-t-lg bg-gray-200">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-red-400"></span> A Fazer
                    </span>
                    <span id="count-todo" class="bg-gray-300 text-sm px-2 py-1 rounded-full text-gray-700">0</span>
                </div>
                <div id="todo" class="column-drop-zone p-4 flex-1 flex flex-col gap-3 overflow-y-auto">
                    <!-- Cartões serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna: Em Andamento -->
            <div class="bg-gray-200 rounded-lg w-80 flex flex-col shadow-sm max-h-full">
                <div
                    class="p-4 font-semibold text-gray-700 border-b border-gray-300 flex justify-between items-center rounded-t-lg bg-gray-200">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-yellow-400"></span> Em Andamento
                    </span>
                    <span id="count-in-progress"
                        class="bg-gray-300 text-sm px-2 py-1 rounded-full text-gray-700">0</span>
                </div>
                <div id="in-progress" class="column-drop-zone p-4 flex-1 flex flex-col gap-3 overflow-y-auto">
                    <!-- Cartões serão inseridos aqui -->
                </div>
            </div>

            <!-- Coluna: Concluído -->
            <div class="bg-gray-200 rounded-lg w-80 flex flex-col shadow-sm max-h-full">
                <div
                    class="p-4 font-semibold text-gray-700 border-b border-gray-300 flex justify-between items-center rounded-t-lg bg-gray-200">
                    <span class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-green-400"></span> Concluído
                    </span>
                    <span id="count-done" class="bg-gray-300 text-sm px-2 py-1 rounded-full text-gray-700">0</span>
                </div>
                <div id="done" class="column-drop-zone p-4 flex-1 flex flex-col gap-3 overflow-y-auto">
                    <!-- Cartões serão inseridos aqui -->
                </div>
            </div>

        </div>
    </main>

    <!-- Modal de Tarefa -->
    <div id="task-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50 transition-opacity">
        <div class="bg-white rounded-lg p-6 w-full max-w-md shadow-xl transform transition-transform">
            <h2 id="modal-title" class="text-xl font-bold mb-4 text-gray-800">Nova Tarefa</h2>
            <input type="hidden" id="task-id">

            <div class="space-y-4">
                <!-- Descrição -->
                <div>
                    <div class="flex justify-between items-end mb-1">
                        <label for="task-content" class="block text-sm font-medium text-gray-700">Descrição da Demanda
                            <span class="text-red-500">*</span></label>
                        <button type="button" id="ai-enhance-btn"
                            class="text-xs text-purple-600 hover:text-purple-800 font-medium flex items-center gap-1 transition-colors px-2 py-1 rounded hover:bg-purple-50">
                            <span>✨</span> Melhorar com IA
                        </button>
                    </div>
                    <textarea id="task-content" rows="3"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-shadow"
                        placeholder="Ex: Revisar relatório mensal..."></textarea>
                </div>

                <!-- Categoria / Tag -->
                <div>
                    <label for="task-category" class="block text-sm font-medium text-gray-700 mb-1">Categoria
                        (Tag)</label>
                    <select id="task-category"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
                        <option value="geral">Geral</option>
                        <option value="urgente">Urgente</option>
                        <option value="bug">Bug / Erro</option>
                        <option value="melhoria">Melhoria</option>
                        <option value="design">Design</option>
                    </select>
                </div>

                <!-- Responsável -->
                <div>
                    <label for="task-assignee" class="block text-sm font-medium text-gray-700 mb-1">Responsável</label>
                    <input type="text" id="task-assignee"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Nome de quem vai fazer">
                </div>

                <!-- Data de Entrega -->
                <div>
                    <label for="task-duedate" class="block text-sm font-medium text-gray-700 mb-1">Data de
                        Entrega</label>
                    <input type="date" id="task-duedate"
                        class="w-full border border-gray-300 rounded-md p-2 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700">
                </div>
            </div>

            <div class="flex justify-end gap-3 mt-6">
                <button id="cancel-modal"
                    class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-md transition-colors">Cancelar</button>
                <button id="save-task"
                    class="px-4 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 transition-colors shadow-sm">Salvar
                    Tarefa</button>
            </div>
        </div>
    </div>

    <!-- Div para Caixa de Mensagem Customizada (Substitui o alert/confirm) -->
    <div id="confirm-dialog"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-lg p-6 w-full max-w-sm shadow-xl text-center">
            <h3 class="text-lg font-bold text-gray-800 mb-2">Excluir Tarefa</h3>
            <p class="text-gray-600 mb-6">Tem certeza que deseja excluir esta demanda? Esta ação não pode ser desfeita.
            </p>
            <div class="flex justify-center gap-3">
                <button id="cancel-delete"
                    class="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-md">Cancelar</button>
                <button id="confirm-delete"
                    class="px-4 py-2 bg-red-600 text-white font-medium rounded-md hover:bg-red-700">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Modal de Resumo da IA -->
    <div id="ai-summary-modal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[60] transition-opacity">
        <div
            class="bg-white rounded-lg p-6 w-full max-w-2xl shadow-xl transform transition-transform flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <span class="text-purple-600">✨</span> Resumo da Equipe (IA)
                </h2>
                <button id="close-summary-modal" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="ai-summary-content"
                class="overflow-y-auto flex-1 text-gray-700 whitespace-pre-wrap leading-relaxed pr-2">
                <!-- Conteúdo gerado pela IA entrará aqui -->
            </div>
            <div class="mt-6 flex justify-end">
                <button id="close-summary-btn"
                    class="px-4 py-2 bg-gray-100 text-gray-700 font-medium rounded-md hover:bg-gray-200 transition-colors shadow-sm">Fechar</button>
            </div>
        </div>
    </div>

    <script>
        // Dados iniciais e estado
        let tasks = JSON.parse(localStorage.getItem('kanbanTasksAdvanced')) || [];

        // Elementos do DOM
        const columns = document.querySelectorAll('.column-drop-zone');
        const modal = document.getElementById('task-modal');
        const modalTitle = document.getElementById('modal-title');

        // Inputs do formulário
        const taskIdInput = document.getElementById('task-id');
        const taskContentInput = document.getElementById('task-content');
        const taskCategoryInput = document.getElementById('task-category');
        const taskAssigneeInput = document.getElementById('task-assignee');
        const taskDueDateInput = document.getElementById('task-duedate');

        const saveTaskBtn = document.getElementById('save-task');

        // Elementos do Diálogo de Confirmação
        const confirmDialog = document.getElementById('confirm-dialog');
        const confirmDeleteBtn = document.getElementById('confirm-delete');
        const cancelDeleteBtn = document.getElementById('cancel-delete');
        let taskToDeleteId = null;

        // Elementos IA
        const aiEnhanceBtn = document.getElementById('ai-enhance-btn');
        const aiSummaryBtn = document.getElementById('ai-summary-btn');
        const aiSummaryModal = document.getElementById('ai-summary-modal');
        const aiSummaryContent = document.getElementById('ai-summary-content');
        const closeSummaryModalBtn = document.getElementById('close-summary-modal');
        const closeSummaryBtn = document.getElementById('close-summary-btn');

        // Configuração de cores para as tags
        const categoryColors = {
            'geral': 'bg-gray-100 text-gray-700 border-gray-200',
            'urgente': 'bg-red-100 text-red-700 border-red-200',
            'bug': 'bg-orange-100 text-orange-700 border-orange-200',
            'melhoria': 'bg-blue-100 text-blue-700 border-blue-200',
            'design': 'bg-purple-100 text-purple-700 border-purple-200'
        };

        const categoryLabels = {
            'geral': 'Geral',
            'urgente': 'Urgente',
            'bug': 'Bug',
            'melhoria': 'Melhoria',
            'design': 'Design'
        };

        // Função para formatar a data
        function formatDate(dateString) {
            if (!dateString) return '';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}`;
        }

        // Verifica se a data está atrasada (apenas visual, sem contar a hora)
        function isOverdue(dateString) {
            if (!dateString) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            // Criando a data da tarefa ajustada para não sofrer problema de fuso horário
            const [year, month, day] = dateString.split('-');
            const taskDate = new Date(year, month - 1, day);

            return taskDate < today;
        }

        // Função para renderizar as tarefas
        function renderTasks() {
            document.getElementById('todo').innerHTML = '';
            document.getElementById('in-progress').innerHTML = '';
            document.getElementById('done').innerHTML = '';

            let counts = { todo: 0, 'in-progress': 0, done: 0 };

            tasks.forEach(task => {
                const taskElement = createTaskElement(task);
                const column = document.getElementById(task.status);
                if (column) {
                    column.appendChild(taskElement);
                    counts[task.status]++;
                }
            });

            // Atualiza contadores
            document.getElementById('count-todo').textContent = counts.todo;
            document.getElementById('count-in-progress').textContent = counts['in-progress'];
            document.getElementById('count-done').textContent = counts.done;

            saveToLocalStorage();
        }

        // Função para criar o elemento visual do cartão
        function createTaskElement(task) {
            const div = document.createElement('div');
            div.className = 'task-card bg-white p-4 rounded-lg shadow-sm border border-gray-200 relative group flex flex-col gap-3 hover:shadow-md hover:border-gray-300';
            div.draggable = true;
            div.dataset.id = task.id;

            // Determinar estilo da Tag
            const catStyle = categoryColors[task.category] || categoryColors['geral'];
            const catLabel = categoryLabels[task.category] || 'Geral';

            // Determinar estilo da Data
            let dateHtml = '';
            if (task.dueDate) {
                const overdueClass = (isOverdue(task.dueDate) && task.status !== 'done') ? 'text-red-600 font-bold' : 'text-gray-500';
                dateHtml = `
                    <div class="flex items-center gap-1 text-xs ${overdueClass}" title="Data de Entrega">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <span>${formatDate(task.dueDate)}</span>
                    </div>
                `;
            }

            // Determinar Responsável
            let assigneeHtml = '';
            if (task.assignee) {
                // Pega a inicial do nome
                const initial = task.assignee.charAt(0).toUpperCase();
                assigneeHtml = `
                    <div class="flex items-center gap-1" title="Responsável: ${escapeHTML(task.assignee)}">
                        <div class="w-6 h-6 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center text-xs font-bold border border-blue-200">
                            ${initial}
                        </div>
                        <span class="text-xs text-gray-600 truncate max-w-[80px]">${escapeHTML(task.assignee)}</span>
                    </div>
                `;
            }

            // Construir o HTML do Cartão
            div.innerHTML = `
                <!-- Tag e Botões -->
                <div class="flex justify-between items-start mb-1">
                    <span class="text-xs font-medium px-2 py-0.5 rounded border ${catStyle}">
                        ${catLabel}
                    </span>
                    
                    <div class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-2 bg-white rounded shadow-sm px-1 border border-gray-100 absolute top-2 right-2 z-10">
                        <button class="edit-btn text-gray-400 hover:text-blue-600 p-1" title="Editar" onclick="openModal('${task.id}')">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                        </button>
                        <button class="delete-btn text-gray-400 hover:text-red-600 p-1" title="Excluir" onclick="requestDelete('${task.id}')">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Conteúdo Principal -->
                <p class="text-sm text-gray-800 break-words leading-snug mt-1">${escapeHTML(task.content)}</p>
                
                <!-- Rodapé do Cartão (Responsável e Data) -->
                ${(assigneeHtml || dateHtml) ? `
                    <div class="mt-2 pt-2 border-t border-gray-100 flex justify-between items-center gap-2">
                        ${assigneeHtml}
                        ${dateHtml}
                    </div>
                ` : ''}
            `;

            div.addEventListener('dragstart', (e) => {
                div.classList.add('dragging');
                // Necessário para o drag drop funcionar em alguns navegadores
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', task.id);
                setTimeout(() => div.classList.add('opacity-50'), 0);
            });

            div.addEventListener('dragend', () => {
                div.classList.remove('dragging', 'opacity-50');
                updateTaskStatus(div);
            });

            return div;
        }

        // Atualiza o array de tarefas
        function updateTaskStatus(draggable) {
            const newStatus = draggable.parentElement.id;
            const taskId = draggable.dataset.id;

            const taskIndex = tasks.findIndex(t => t.id === taskId);
            if (taskIndex !== -1 && tasks[taskIndex].status !== newStatus) {
                tasks[taskIndex].status = newStatus;
                renderTasks();
            }
        }

        function saveToLocalStorage() {
            // Mudamos a chave para não conflitar com a versão anterior mais simples
            localStorage.setItem('kanbanTasksAdvanced', JSON.stringify(tasks));
        }

        // Utilitário Segurança
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        columns.forEach(column => {
            column.addEventListener('dragover', e => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                column.classList.add('drag-over');

                const draggingElement = document.querySelector('.dragging');
                if (draggingElement) {
                    column.appendChild(draggingElement);
                }
            });

            column.addEventListener('dragleave', () => {
                column.classList.remove('drag-over');
            });

            column.addEventListener('drop', () => {
                column.classList.remove('drag-over');
            });
        });

        function openModal(id = null) {
            modal.classList.remove('hidden');
            // Animação simples de entrada
            setTimeout(() => modal.firstElementChild.classList.add('scale-100'), 10);

            taskContentInput.focus();

            if (id) {
                modalTitle.textContent = 'Editar Tarefa';
                const task = tasks.find(t => t.id === id);
                taskContentInput.value = task.content || '';
                taskCategoryInput.value = task.category || 'geral';
                taskAssigneeInput.value = task.assignee || '';
                taskDueDateInput.value = task.dueDate || '';
                taskIdInput.value = id;
            } else {
                modalTitle.textContent = 'Nova Tarefa';
                taskContentInput.value = '';
                taskCategoryInput.value = 'geral';
                taskAssigneeInput.value = '';
                taskDueDateInput.value = '';
                taskIdInput.value = '';
            }
        }

        function closeModal() {
            modal.classList.add('hidden');
        }

        function saveTask() {
            const content = taskContentInput.value.trim();
            if (!content) {
                // Feedback visual de erro simples
                taskContentInput.classList.add('border-red-500', 'ring-red-500');
                setTimeout(() => taskContentInput.classList.remove('border-red-500', 'ring-red-500'), 2000);
                return;
            }

            const id = taskIdInput.value;
            const category = taskCategoryInput.value;
            const assignee = taskAssigneeInput.value.trim();
            const dueDate = taskDueDateInput.value;

            if (id) {
                // Editar existente
                const taskIndex = tasks.findIndex(t => t.id === id);
                if (taskIndex !== -1) {
                    tasks[taskIndex] = {
                        ...tasks[taskIndex], // Mantém status e ID
                        content,
                        category,
                        assignee,
                        dueDate
                    };
                }
            } else {
                // Criar nova
                tasks.push({
                    id: 'task_' + Date.now().toString(),
                    content: content,
                    category: category,
                    assignee: assignee,
                    dueDate: dueDate,
                    status: 'todo' // Padrão
                });
            }

            closeModal();
            renderTasks();
        }

        // Exposto globalmente para o onclick no HTML
        window.requestDelete = function (id) {
            taskToDeleteId = id;
            confirmDialog.classList.remove('hidden');
        }

        function executeDelete() {
            if (taskToDeleteId) {
                tasks = tasks.filter(t => t.id !== taskToDeleteId);
                renderTasks();
            }
            closeConfirmDialog();
        }

        function closeConfirmDialog() {
            confirmDialog.classList.add('hidden');
            taskToDeleteId = null;
        }

        async function callGemini(prompt) {
            const apiKey = ""; // A chave API é injetada automaticamente pelo ambiente
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }]
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();

                if (result.candidates && result.candidates[0] && result.candidates[0].content) {
                    return result.candidates[0].content.parts[0].text;
                } else {
                    console.error("Formato de resposta inesperado:", result);
                    return null;
                }
            } catch (error) {
                console.error("Erro ao chamar API do Gemini:", error);
                return null;
            }
        }

        aiEnhanceBtn.addEventListener('click', async () => {
            const currentText = taskContentInput.value.trim();
            if (!currentText) {
                // Efeito visual indicando que precisa digitar algo
                taskContentInput.classList.add('border-red-500');
                setTimeout(() => taskContentInput.classList.remove('border-red-500'), 2000);
                return;
            }

            const originalHtml = aiEnhanceBtn.innerHTML;
            aiEnhanceBtn.innerHTML = '<span class="animate-pulse">⏳ Melhorando...</span>';
            aiEnhanceBtn.disabled = true;
            aiEnhanceBtn.classList.add('opacity-50', 'cursor-not-allowed');

            const prompt = `Você é um assistente de gestão de projetos. Melhore a seguinte descrição de tarefa para ficar mais clara, profissional, objetiva e acionável. Não adicione saudações ou comentários extras, retorne APENAS a descrição melhorada.\n\nDescrição original: ${currentText}`;

            const enhancedText = await callGemini(prompt);
            if (enhancedText) {
                taskContentInput.value = enhancedText.trim();
            } else {
                aiEnhanceBtn.innerHTML = '<span class="text-red-500">Erro na IA</span>';
                setTimeout(() => { aiEnhanceBtn.innerHTML = originalHtml; }, 2000);
            }

            if (enhancedText) aiEnhanceBtn.innerHTML = originalHtml;
            aiEnhanceBtn.disabled = false;
            aiEnhanceBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        });

        function openSummaryModal() {
            aiSummaryModal.classList.remove('hidden');
            setTimeout(() => aiSummaryModal.firstElementChild.classList.add('scale-100'), 10);
        }

        function closeSummaryModal() {
            aiSummaryModal.classList.add('hidden');
            aiSummaryModal.firstElementChild.classList.remove('scale-100');
        }

        aiSummaryBtn.addEventListener('click', async () => {
            if (tasks.length === 0) {
                openSummaryModal();
                aiSummaryContent.innerHTML = '<p class="text-gray-500 italic">O quadro está vazio. Crie algumas tarefas primeiro para a IA analisar.</p>';
                return;
            }

            openSummaryModal();
            aiSummaryContent.innerHTML = `
                <div class="flex flex-col items-center justify-center py-8 text-purple-600">
                    <svg class="animate-spin w-8 h-8 mb-4" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <p class="animate-pulse font-medium">A IA está analisando o andamento das demandas...</p>
                </div>
            `;

            let boardData = "Status das Tarefas do Kanban da Equipe:\n";
            const colunasMap = { 'todo': 'A Fazer', 'in-progress': 'Em Andamento', 'done': 'Concluído' };

            tasks.forEach(t => {
                const statusName = colunasMap[t.status];
                boardData += `- [${statusName}] ${t.content} (Tag: ${t.category}, Responsável: ${t.assignee || 'Não atribuído'})\n`;
            });

            const prompt = `Você é um gerente de equipe excelente. Leia as tarefas atuais do nosso Kanban abaixo e crie um Resumo de Status Executivo para a equipe (em português do Brasil). 
            
            Regras:
            1. Seja encorajador, claro e objetivo.
            2. Destaque gargalos se houver muitas tarefas "A Fazer" ou "Em Andamento".
            3. Celebre as tarefas em "Concluído" se houver alguma.
            4. Formate o texto de forma fácil de ler, usando formatação Markdown (use **negrito** para destaques).
            5. O texto deve ter de 2 a 3 parágrafos curtos.\n\n${boardData}`;

            const summaryText = await callGemini(prompt);

            if (summaryText) {
                // Formatação simples de Markdown para HTML (Negrito, Quebra de linha e Listas)
                let formattedText = summaryText
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/\n/g, '<br>');
                aiSummaryContent.innerHTML = formattedText;
            } else {
                aiSummaryContent.innerHTML = '<p class="text-red-500 font-medium">Ocorreu um erro ao gerar o resumo com a IA. Tente novamente.</p>';
            }
        });

        // Eventos do Modal de Resumo
        closeSummaryModalBtn.addEventListener('click', closeSummaryModal);
        closeSummaryBtn.addEventListener('click', closeSummaryModal);
        aiSummaryModal.addEventListener('click', (e) => {
            if (e.target === aiSummaryModal) closeSummaryModal();
        });


        document.getElementById('add-task-btn').addEventListener('click', () => openModal());
        document.getElementById('cancel-modal').addEventListener('click', closeModal);
        saveTaskBtn.addEventListener('click', saveTask);

        // Eventos do Dialog de Delete
        confirmDeleteBtn.addEventListener('click', executeDelete);
        cancelDeleteBtn.addEventListener('click', closeConfirmDialog);

        // Salvar com Enter
        taskContentInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                saveTask();
            }
        });

        // Fechar modais clicando no fundo escuro
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        confirmDialog.addEventListener('click', (e) => {
            if (e.target === confirmDialog) closeConfirmDialog();
        });

        // Inicialização
        renderTasks();

    </script>
</body>

</html>
